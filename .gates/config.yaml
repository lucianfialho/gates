version: 1

project:
  name: gates
  stack: [typescript, bun, effect-v4, anthropic-sdk]

# Active provider and model (no API keys here — use: gates auth set <provider> <key>)
provider: minimax
model: minimax-m2.7

# Provider declarations — only base_url, no secrets
providers:
  anthropic: {}
  openai: {}
  minimax:
    base_url: https://api.minimax.io/v1
  ollama:
    base_url: http://localhost:11434/v1

indexed_directories:
  - path: src/agent
    specialist: agent-loop
  - path: src/machine
    specialist: state-machine
  - path: src/services
    specialist: services
  - path: src/gates
    specialist: gates
  - path: src/context
    specialist: context
  - path: src/auth
    specialist: auth
  - path: src/chat
    specialist: chat-tui
  - path: src/config
    specialist: config
  - path: skills
    specialist: skills
