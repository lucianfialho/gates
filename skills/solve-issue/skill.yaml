id: solve-issue
version: 1
description: |
  Read a GitHub issue (or plain text), implement the solution with hard gates,
  and open a PR. Full cycle: clarify → research → analyze → branch → implement → verify → open_pr.

initial_state: clarify

inputs:
  required:
    - name: issue
      type: string
      description: GitHub issue number (e.g. "42") or plain text description

states:
  clarify:
    description: |
      Ambiguity Gatekeeper — check if the issue is clear enough to act on.
      If ambiguous, list clarifying questions. If clear, proceed immediately.
      GATE: must output ready=true or ready=false with questions.
    agent_prompt: |
      You are the Ambiguity Gatekeeper. Your job is to check if this request
      is specific enough to implement without guessing.

      Request: {{inputs.issue}}

      Rules:
      - If this is a GitHub issue number, it is ready (the issue has all context).
      - If this is a text description, check: does it name specific files or behavior?
        Is the expected outcome clear? Is there enough to write a test for it?
      - Do NOT start implementing — only assess clarity.

      Respond with a JSON code block:
      ```json
      {
        "ready": true,
        "questions": []
      }
      ```
      OR if the request needs clarification:
      ```json
      {
        "ready": false,
        "questions": [
          "What file or component should be affected?",
          "What is the expected behavior after the fix?"
        ]
      }
      ```
    output_schema: schemas/clarify.output.schema.json
    on_error: retry
    max_retries: 1
    transitions:
      - to: research
        when: ready == true
      - to: done_clarify

  done_clarify:
    terminal: true
    description: Request needs clarification before proceeding.
    agent_prompt: ""

  research:
    description: |
      Read .metadata/summary.yaml files for indexed directories.
      Match the issue to relevant directories using summaries only.
      Do NOT read full source files — only summaries.
      GATE: relevant_dirs and likely_files confirmed from metadata.
    agent_prompt: |
      You are synthesizing a research context for an issue.

      Issue: {{inputs.issue}}

      The metadata index and related issues are already loaded in your system prompt.
      Do NOT make tool calls to read files — the context is pre-loaded for you.

      Your job:
      1. Read the "Project metadata" section in the system prompt
      2. Match the issue to relevant directories based on title/covers/specialist
      3. From the covers of relevant dirs, identify likely_files
      4. Read the "Related issues" section for lessons from past work
      5. Identify what is explicitly OUT OF SCOPE

      GATE CONDITION: your output must reference specific files from the
      covers fields in the metadata section. Do not invent paths.

      Respond with a JSON code block:
      ```json
      {
        "relevant_dirs": ["src/services"],
        "likely_files": ["src/services/Logger.ts"],
        "research_summary": "issue requires changes to X because Y",
        "out_of_scope": ["src/auth", "src/chat"]
      }
      ```
    output_schema: schemas/research.output.schema.json
    on_error: retry
    max_retries: 2
    transitions:
      - to: analyze

  analyze:
    description: |
      Deep-read only the files identified in research.
      Produce a precise implementation plan.
      GATE: plan confirmed against actual file contents.
    agent_prompt: |
      You are producing an implementation plan based on prior research.

      Issue: {{inputs.issue}}

      Research output (pre-confirmed):
      - Relevant dirs: {{outputs.research.relevant_dirs}}
      - Likely files:  {{outputs.research.likely_files}}
      - Summary:       {{outputs.research.research_summary}}
      - Out of scope:  {{outputs.research.out_of_scope}}

      Steps:
      1. If issue is a GitHub number, call gh_issue_read to get full body.
      2. Read ONLY the files in likely_files — do not explore beyond them.
      3. Identify the minimal change needed in each file.
      4. Produce a step-by-step plan.

      GATE CONDITION: read each file in likely_files before responding.
      Do not invent paths — only use files confirmed in research.

      Respond with a JSON code block:
      ```json
      {
        "issue_title": "short title for branch/PR",
        "summary": "one sentence describing the problem",
        "files": ["confirmed/path/to/file.ts"],
        "plan": ["step 1", "step 2"],
        "complexity": "low|medium|high",
        "issue_number": null
      }
      ```
    output_schema: schemas/analyze.output.schema.json
    on_error: retry
    max_retries: 2
    hitl_pause: true
    transitions:
      - to: branch

  branch:
    description: |
      Create a feature branch for this issue.
      GATE: branch created and checked out.
    agent_prompt: |
      Create and checkout a feature branch for this work.

      Issue title: {{outputs.analyze.issue_title}}
      Issue number: {{outputs.analyze.issue_number}}

      Steps:
      1. Generate a branch name:
         - If issue_number is set: use "issue-{{outputs.analyze.issue_number}}"
         - Otherwise: slugify the issue title (lowercase, hyphens, max 40 chars)
      2. Run: bash("git checkout -b <branch-name> 2>&1")
      3. Confirm the branch was created with: bash("git branch --show-current")

      GATE CONDITION: git branch --show-current must return your new branch name.

      Respond with a JSON code block:
      ```json
      {
        "branch": "issue-42",
        "created": true
      }
      ```
    output_schema: schemas/branch.output.schema.json
    on_error: retry
    max_retries: 2
    transitions:
      - to: implement

  implement:
    description: |
      Implement by Contract — follow the analyze spec exactly.
      GATE: typecheck must exit 0.
    agent_prompt: |
      You are implementing by contract. The contract below was approved by the human.
      You MUST follow it exactly — do not deviate, add features, or change scope.

      ═══ CONTRACT (approved by human) ═══
      Summary: {{outputs.analyze.summary}}
      Files:   {{outputs.analyze.files}}
      Plan:    {{outputs.analyze.plan}}
      ═════════════════════════════════════

      Steps:
      1. Read each file in the contract before editing
      2. Implement ONLY what the contract specifies — nothing more
      3. Update .metadata/summary.yaml for each directory you touch:
         - Set last_updated to today's date, status to "filled"
         - Stage it: bash("git add <dir>/.metadata/summary.yaml")
      4. Run: bash("bun run typecheck 2>&1")
      5. Fix errors, re-run until exit 0
      6. If you find you need to touch files NOT in the contract, STOP and report it

      GATE CONDITION: typecheck exits 0 and you stayed within contract scope.

      Respond with a JSON code block:
      ```json
      {
        "files_changed": ["path/to/file.ts"],
        "summary": "one sentence of what was done",
        "typecheck_passed": true
      }
      ```
    output_schema: schemas/implement.output.schema.json
    on_error: hitl
    transitions:
      - to: verify

  verify:
    description: |
      Independent review. GATE: passed must be true.
    agent_prompt: |
      Verify the implementation independently.

      Changes: {{outputs.implement.summary}}
      Files: {{outputs.implement.files_changed}}

      Steps:
      1. Read each changed file
      2. Run typecheck again independently
      3. Check the original issue is addressed

      GATE CONDITION: run typecheck yourself — don't trust the previous state.

      Respond with a JSON code block:
      ```json
      {
        "passed": true,
        "checks_run": ["typecheck", "code review of X"],
        "issues": []
      }
      ```
    output_schema: schemas/verify.output.schema.json
    on_error: retry
    max_retries: 1
    transitions:
      - to: open_pr
        when: passed == true
      - to: implement

  open_pr:
    description: |
      Commit, push, and open a PR.
      GATE: PR URL in output.
    agent_prompt: |
      Commit the changes and open a pull request.

      Branch: {{outputs.branch.branch}}
      Summary: {{outputs.implement.summary}}
      Files changed: {{outputs.implement.files_changed}}
      Issue number: {{outputs.analyze.issue_number}}
      Issue title: {{outputs.analyze.issue_title}}

      Steps:
      1. Stage all changed files: bash("git add <files>")
      2. Commit: bash("git commit -m '<summary>'")
         The metadata gate will block if .metadata/summary.yaml is not staged —
         if it blocks, stage the missing summary files and retry the commit.
      3. Push: bash("git push -u origin {{outputs.branch.branch}} 2>&1")
      4. Create PR with gh_pr_create:
         - title: "{{outputs.analyze.issue_title}}"
         - body: include summary, what was changed, and "Closes #{{outputs.analyze.issue_number}}" if issue_number is set
         - base: "main"

      GATE CONDITION: gh_pr_create must return a URL starting with https://

      Respond with a JSON code block:
      ```json
      {
        "pr_url": "https://github.com/owner/repo/pull/N",
        "branch": "issue-42"
      }
      ```
    output_schema: schemas/open_pr.output.schema.json
    on_error: retry
    max_retries: 2
    transitions:
      - to: done

  done:
    terminal: true
    description: All gates passed. PR is open.
    agent_prompt: ""
