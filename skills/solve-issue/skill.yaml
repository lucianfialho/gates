id: solve-issue
version: 1
description: |
  Read a GitHub issue (or plain text), implement the solution with hard gates,
  and open a PR. Full cycle: clarify → research → analyze → implement → verify.
  Branch creation and PR opening are handled deterministically by the Runner (zero tokens).

initial_state: clarify

inputs:
  required:
    - name: issue
      type: string
      description: GitHub issue number (e.g. "42") or plain text description
  optional:
    - name: chat_context
      type: string
      description: Recent conversation context — if present, use it to skip file rediscovery

states:
  clarify:
    description: |
      Ambiguity Gatekeeper — check if the issue is clear enough to act on.
      If ambiguous, list clarifying questions. If clear, proceed immediately.
      GATE: must output ready=true or ready=false with questions.
    agent_prompt: |
      You are the Ambiguity Gatekeeper. Your job is to check if this request
      is specific enough to implement without guessing.

      Request: {{inputs.issue}}

      Recent conversation context (if any):
      {{inputs.chat_context}}

      Rules:
      - If this is a GitHub issue number → ready: true immediately.
      - If chat_context above mentions specific files, root causes, or expected behavior → ready: true.
      - If the request alone names specific files or clear behavior → ready: true.
      - Only return ready: false if you genuinely cannot determine what to implement.
      - Do NOT start implementing — only assess clarity.

      Respond with a JSON code block:
      ```json
      {
        "ready": true,
        "questions": []
      }
      ```
      OR if the request needs clarification:
      ```json
      {
        "ready": false,
        "questions": [
          "What file or component should be affected?",
          "What is the expected behavior after the fix?"
        ]
      }
      ```
    output_schema: schemas/clarify.output.schema.json
    on_error: retry
    max_retries: 1
    transitions:
      - to: research
        when: ready == true
      - to: done_clarify

  done_clarify:
    terminal: true
    description: Request needs clarification before proceeding.
    agent_prompt: ""

  research:
    description: |
      Read .metadata/summary.yaml files for indexed directories.
      Match the issue to relevant directories using summaries only.
      Do NOT read full source files — only summaries.
      GATE: relevant_dirs and likely_files confirmed from metadata.
    agent_prompt: |
      You are synthesizing a research context for an issue.

      Issue: {{inputs.issue}}

      {{inputs.chat_context}}

      IMPORTANT: If the section above contains a recent conversation that mentions
      specific files, root causes, or what needs to change — USE THAT DIRECTLY.
      Do not rediscover what was already discussed. The conversation context
      is authoritative — trust it over the metadata index.

      If no conversation context is present OR it doesn't mention specific files:
      1. Read the "Project metadata" section in the system prompt
      2. Match the issue to relevant directories based on title/covers/specialist
      3. From the covers of relevant dirs, identify likely_files
      4. Read the "Related issues" section for lessons from past work

      GATE CONDITION: output must reference specific files. If conversation context
      named them, use those. Otherwise derive from metadata covers fields.

      Respond with a JSON code block:
      ```json
      {
        "relevant_dirs": ["src/services"],
        "likely_files": ["src/services/Logger.ts"],
        "research_summary": "issue requires changes to X because Y",
        "out_of_scope": ["src/auth", "src/chat"]
      }
      ```
    output_schema: schemas/research.output.schema.json
    on_error: retry
    max_retries: 2
    budget_tokens: 80000
    transitions:
      - to: analyze

  analyze:
    description: |
      Read only the files from research. Produce a PRP (Product Requirement Prompt).
      The PRP is the implementation contract — implement follows it exactly.
      GATE: PRP validated against schema, files confirmed to exist.
    agent_prompt: |
      You are producing a PRP (Product Requirement Prompt) — the implementation contract.

      Issue: {{inputs.issue}}

      Research (pre-confirmed by Runner):
      - Relevant dirs: {{outputs.research.relevant_dirs}}
      - Likely files:  {{outputs.research.likely_files}}
      - Summary:       {{outputs.research.research_summary}}
      - Out of scope:  {{outputs.research.out_of_scope}}

      Steps:
      1. If issue is a GitHub number, call gh_issue_read for full body.
      2. Read ONLY the files in likely_files — read key sections with read_lines.
      3. Identify the root cause precisely — not "what to do" but "why it breaks".
      4. For each file: describe exactly what changes (pattern: before → after).
      5. Write acceptance criteria as concrete, verifiable commands or observations.

      GATE: read each file in likely_files before writing the PRP.
      Do not add files not in likely_files — that breaks contract scope.

      Respond with a JSON code block:
      ```json
      {
        "id": "add-prompt-caching",
        "issue_number": 4,
        "issue_title": "Add prompt caching to Anthropic provider",
        "complexity": "low",
        "context": {
          "summary": "system prompt sent uncached on every call, multiplying cost",
          "relevant_dirs": ["src/services"],
          "files": ["src/services/providers/Anthropic.ts"],
          "related_issues": [
            { "number": 1, "title": "improve logs formatting", "lesson": "Logger must not be an Effect service" }
          ],
          "out_of_scope": ["src/auth", "src/chat", "src/gates"]
        },
        "spec": {
          "root_cause": "messages.create sends system as plain string — Anthropic only caches array format",
          "changes": [
            {
              "file": "src/services/providers/Anthropic.ts",
              "description": "Wrap system in array with cache_control ephemeral",
              "pattern": "system: string → system: [{type:'text', text:str, cache_control:{type:'ephemeral'}}]"
            }
          ],
          "constraints": [
            "only Anthropic provider — OpenAI and MiniMax providers must be unchanged",
            "cache_control is ephemeral — does not persist across sessions"
          ]
        },
        "acceptance": [
          "bun run typecheck exits 0",
          "Anthropic provider sends system as array in API call",
          "OpenAI and MiniMax providers pass typecheck unchanged"
        ]
      }
      ```
    output_schema: schemas/prp.output.schema.json
    on_error: hitl
    max_retries: 2
    hitl_pause: true
    budget_tokens: 60000
    transitions:
      - to: implement

  implement:
    description: |
      Implement by Contract — follow the analyze spec exactly.
      GATE: typecheck must exit 0.
    agent_prompt: |
      You are implementing by contract. The contract below was approved by the human.
      You MUST follow it exactly — do not deviate, add features, or change scope.

      ════════════════ PRP CONTRACT ════════════════
      Root cause:  {{outputs.analyze.spec.root_cause}}
      Files:       {{outputs.analyze.context.files}}
      Out of scope:{{outputs.analyze.context.out_of_scope}}

      Changes required:
      {{outputs.analyze.spec.changes}}

      Constraints:
      {{outputs.analyze.spec.constraints}}

      Lessons from related issues:
      {{outputs.analyze.context.related_issues}}

      Acceptance criteria (verify will check these):
      {{outputs.analyze.acceptance}}
      ══════════════════════════════════════════════

      Steps:
      1. Read each file in context.files — use read_lines for key sections
      2. Implement ONLY what spec.changes describes — nothing more
      3. If you need to touch a file NOT in context.files, STOP — it means
         the PRP is incomplete. Report which file and why, don't proceed.
      4. Update .metadata/summary.yaml for each directory touched
      5. Stage all modified files including metadata: bash("git add -A") — CRITICAL: this stages .metadata/summary.yaml files so the metadata gate won't block the commit in open_pr
      6. Run: bash("bun run typecheck 2>&1") — fix until exit 0

      IMPORTANT: Step 5 (git add -A) is required to ensure metadata files are staged.
      Without this, the metadata gate will block the commit in open_pr state.

      GATE CONDITION: typecheck exits 0, only contract files modified.

      Respond with a JSON code block:
      ```json
      {
        "files_changed": ["path/to/file.ts"],
        "summary": "one sentence of what was done",
        "typecheck_passed": true,
        "metadata_staged": true
      }
      ```
    output_schema: schemas/implement.output.schema.json
    on_error: hitl
    transitions:
      - to: verify

  verify:
    description: |
      Lightweight verification — run commands only, no re-reading files.
      GATE: passed must be true.
    agent_prompt: |
      Verify the implementation by running commands. Do NOT re-read source files —
      the implement state already read them. Only run tools, check outputs.

      Changes made: {{outputs.implement.summary}}
      Typecheck already passed: {{outputs.implement.typecheck_passed}}

      PRP acceptance criteria:
      {{outputs.analyze.acceptance}}

      Steps — commands only, NO file edits, NO writes:
      1. Run: bash("bun run typecheck 2>&1") — must exit 0
      2. For acceptance criteria that require running the gates binary: use
         bash("GATES_NO_LLM=1 bun src/index.ts <command> 2>&1")
         This prevents recursive LLMService initialization errors.
      3. Do NOT run: bun src/index.ts chat, run, resume, or gateway — those need LLM.
      4. For criteria about code structure (not runnable): mark as verified-by-implement

      GATE CONDITION: typecheck exits 0. Do not read or edit files.
      You CANNOT fix issues here — report them in `issues` and set passed=false.
      The Runner will handle returning to implement via HITL if needed.

      Respond with a JSON code block:
      ```json
      {
        "passed": true,
        "checks_run": ["typecheck", "code review of X"],
        "issues": []
      }
      ```
    output_schema: schemas/verify.output.schema.json
    on_error: hitl
    max_retries: 1
    budget_tokens: 30000
    timeout_ms: 60000
    transitions:
      - to: done
        when: passed == true
      - to: implement

  done:
    terminal: true
    description: All gates passed. PR is open.
    agent_prompt: ""
