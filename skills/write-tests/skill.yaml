id: write-tests
version: 1
description: |
  Read a source file, generate a test file alongside it, and verify the tests pass.
  Each state is a hard gate — the agent must produce concrete evidence
  before the Runner advances to the next state.

initial_state: analyze

inputs:
  required:
    - name: file_path
      type: string

states:
  analyze:
    description: |
      Read the source file, identify what needs testing.
      GATE: must produce a JSON block with confirmed file path, derived test file path,
      list of items to test, and language.
    agent_prompt: |
      You are analyzing a source file to plan test coverage.

      File to test: {{inputs.file_path}}

      Steps you MUST complete before responding:
      1. Use read or read_lines to open the file at {{inputs.file_path}} and confirm it exists
      2. Identify all exported functions, classes, and branch logic that need test coverage
      3. Determine the test file path — place it adjacent to the source file using the
         convention `<basename>.test.<ext>` (e.g. `src/foo.ts` → `src/foo.test.ts`)
      4. Detect the language (e.g. "typescript", "javascript") from the file extension

      GATE CONDITION: You may only proceed when you have read the file and confirmed it exists.
      "I think the file is at X" is not enough — you must have called read or read_lines
      and seen the content.

      Respond with a JSON code block:
      ```json
      {
        "file_path": "confirmed/path/to/source.ts",
        "test_file_path": "confirmed/path/to/source.test.ts",
        "items_to_test": ["functionA — happy path", "functionA — error branch", "ClassB.method"],
        "language": "typescript"
      }
      ```
    output_schema: schemas/analyze.output.schema.json
    on_error: retry
    max_retries: 2
    transitions:
      - to: write

  write:
    description: |
      Generate the test file and confirm at least one test passes.
      GATE: bun test must show at least one passing test before this state passes.
    agent_prompt: |
      Generate a test file for the source file and run it.

      Source file: {{outputs.analyze.file_path}}
      Test file to create: {{outputs.analyze.test_file_path}}
      Items to test: {{outputs.analyze.items_to_test}}
      Language: {{outputs.analyze.language}}

      Steps you MUST complete:
      1. Read the source file at {{outputs.analyze.file_path}} again to have the latest content
      2. Write a complete test file at {{outputs.analyze.test_file_path}} using the write tool.
         - Use bun test as the runner: `import { describe, it, expect } from 'bun:test'`
         - Cover every item listed in items_to_test with at least one test case each
         - Include both happy-path and error/edge cases where applicable
      3. Run: bash("bun test {{outputs.analyze.test_file_path}} 2>&1")
      4. If tests fail, fix the test file and run again until at least one test passes

      GATE CONDITION: You may only respond when you have seen bun test output
      showing at least one passing test. "It should work" is not enough — run it.

      Respond with a JSON code block:
      ```json
      {
        "test_file_path": "path/to/source.test.ts",
        "summary": "one sentence describing what was tested",
        "tests_written": 5
      }
      ```
    output_schema: schemas/write.output.schema.json
    on_error: retry
    max_retries: 2
    transitions:
      - to: verify

  verify:
    description: |
      Independent verification — re-run tests and confirm zero failures.
      GATE: passed must be true, with bun test showing zero failures.
    agent_prompt: |
      Independently verify the generated tests pass with zero failures.

      Test file: {{outputs.write.test_file_path}}
      Summary of what was written: {{outputs.write.summary}}

      Steps:
      1. Read the test file at {{outputs.write.test_file_path}} to inspect its contents
      2. Run: bash("bun test {{outputs.write.test_file_path}} 2>&1")
      3. Parse the bun test output — only set passed: true when you see zero failures
         (look for "X passed" with no "X failed" line, or "pass X  fail 0")
      4. If any tests are failing, record them in issues and set passed: false

      GATE CONDITION: You must have run bun test and read the test file yourself.
      Do not report passed=true based on the previous state's claim — verify independently.

      Respond with a JSON code block:
      ```json
      {
        "passed": true,
        "checks_run": ["bun test {{outputs.write.test_file_path}}", "read test file"],
        "issues": []
      }
      ```
    output_schema: schemas/verify.output.schema.json
    on_error: retry
    max_retries: 1
    transitions:
      - to: done
        when: passed == true
      - to: write

  done:
    terminal: true
    description: All gates passed. Tests are written and verified. Skill complete.
    agent_prompt: ""
